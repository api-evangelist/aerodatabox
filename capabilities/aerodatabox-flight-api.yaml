        - name: codeType
          in: path
          type: string
          description: Type of code to search airport by (`iata` or `icao`)
        - name: code
          in: path
          type: string
          description: "If `codeType` is:\r"
          required: true
        - name: offsetMinutes
          in: query
          type: integer
          description: 'Beginning of the search range expressed in minutes relative to the current time at the airport (default:
            `-120`)'
        - name: durationMinutes
          in: query
          type: integer
          description: 'Length (duration) of the search range expressed in minutes (default: `720`)'
        - name: direction
          in: query
          type: string
          description: 'Direction of flights: Arrival, Departure or Both (default)'
        - name: withLeg
          in: query
          type: boolean
          description: If set to true, the result will include movement information from airport opposite in this flight leg
            (airport of origin for arriving flight or airport of desti
        - name: withCancelled
          in: query
          type: boolean
          description: "If set to true, result will include cancelled, divered, likely cancelled (CanceledUncertain) flights.\r"
        - name: withCodeshared
          in: query
          type: boolean
          description: "If set to true, the result will include flights with all code-shared statuses.\r"
        - name: withCargo
          in: query
          type: boolean
          description: If set to true, the result will include cargo flights (subject to availability).
        - name: withPrivate
          in: query
          type: boolean
          description: If set to true, the result will include private flights (subject to availability).
        - name: withLocation
          in: query
          type: boolean
          description: "If set to true, each currently active flight within the result will be populated \r"
