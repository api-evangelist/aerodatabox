        with:
          codeType: rest.codeType
          code: rest.code
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/airports/{codetype}/{code}/stats/routes/daily/{datelocal}
      name: airports-codetype-code-stats-routes-daily-datelocal
      description: REST surface for airports-codeType-code-stats-routes-daily-dateLocal.
      operations:
      - method: GET
        name: getroutedailystatisticsroutesdailatspecificdate
        description: AeroDataBox Airport Routes and Daily Flight Destinations / TIER 3
        call: aerodatabox-statistical-api.getroutedailystatisticsroutesdailatspecificdate
        with:
          codeType: rest.codeType
          code: rest.code
          dateLocal: rest.dateLocal
        outputParameters:
        - type: object
