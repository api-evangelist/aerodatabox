naftiko: 1.0.0-alpha2
info:
  label: AeroDataBox API - Aviation and Flight API — Statistical API
  description: 'AeroDataBox API - Aviation and Flight API — Statistical API. 8 operations. Lead operation: AeroDataBox Global
    Delays (current or Historical Moment) / TIER 3. Self-contained Naftiko capability covering one Aerodatabox business surface.'
  tags:
  - Aerodatabox
  - Statistical API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AERODATABOX_API_KEY: AERODATABOX_API_KEY
capability:
  consumes:
  - type: http
    namespace: aerodatabox-statistical-api
    baseUri: https://prod.api.market/api/v1/aedbx/aerodatabox
    description: AeroDataBox API - Aviation and Flight API — Statistical API business capability. Self-contained, no shared
      references.
    resources:
    - name: airports-delays
      path: /airports/delays
      operations:
      - name: getglobaldelaysglobaldelayscurent
        method: GET
        description: AeroDataBox Global Delays (current or Historical Moment) / TIER 3
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: airports-delays-dateUtc
      path: /airports/delays/{dateUtc}
      operations:
      - name: getglobaldelaysglobaldelaysatspecificdate
        method: GET
        description: AeroDataBox Global Delays (current or Historical Moment) / TIER 3
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dateUtc
          in: path
          type: string
          description: "The moment of time for / from which delay data is requested (UTC time, format: YYYY-MM-DDTHH:mm).\r"
          required: true
    - name: airports-codeType-code-delays
      path: /airports/{codeType}/{code}/delays
      operations:
      - name: getairportdelaydelayscurrent
        method: GET
        description: AeroDataBox Airport Delays (current or Historical Moment) / TIER 3
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: codeType
          in: path
          type: string
          description: Type of code to search airport by (`iata` or `icao`)
        - name: code
          in: path
          type: string
          description: "If `codeType` is:\r"
          required: true
    - name: airports-codeType-code-delays-dateFromLocal-dateToLocal
      path: /airports/{codeType}/{code}/delays/{dateFromLocal}/{dateToLocal}
      operations:
      - name: getairportdelays
        method: GET
        description: AeroDataBox Airport Delays (historical Period) / TIER 3
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: codeType
          in: path
          type: string
          description: Type of code to search airport by (`iata` or `icao`)
        - name: code
          in: path
          type: string
          description: "If `codeType` is:\r"
          required: true
        - name: dateFromLocal
          in: path
          type: string
          description: 'The beginning of the period of time for which delay data is requested (local time, format: YYYY-MM-DDTHH:mm).'
          required: true
        - name: dateToLocal
          in: path
          type: string
          description: 'The end of the period of time for which delay data is requested (local time, format: YYYY-MM-DDTHH:mm).'
          required: true
    - name: airports-codeType-code-delays-dateLocal
      path: /airports/{codeType}/{code}/delays/{dateLocal}
      operations:
      - name: getairportdelaydelayshistorical
        method: GET
        description: AeroDataBox Airport Delays (current or Historical Moment) / TIER 3
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: codeType
          in: path
          type: string
          description: Type of code to search airport by (`iata` or `icao`)
        - name: code
          in: path
          type: string
          description: "If `codeType` is:\r"
          required: true
        - name: dateLocal
          in: path
          type: string
          description: "The moment of time for / from which delay data is requested (local time, format: YYYY-MM-DDTHH:mm).\
            \ \r"
          required: true
    - name: airports-codeType-code-stats-routes-daily
      path: /airports/{codeType}/{code}/stats/routes/daily
      operations:
      - name: getroutedailystatisticsroutesdailycurrent
        method: GET
        description: AeroDataBox Airport Routes and Daily Flight Destinations / TIER 3
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: codeType
          in: path
          type: string
          description: Type of code to search airport by (`iata` or `icao`)
        - name: code
          in: path
          type: string
          description: "If `codeType` is:\r"
          required: true
    - name: airports-codeType-code-stats-routes-daily-dateLocal
      path: /airports/{codeType}/{code}/stats/routes/daily/{dateLocal}
      operations:
      - name: getroutedailystatisticsroutesdailatspecificdate
        method: GET
        description: AeroDataBox Airport Routes and Daily Flight Destinations / TIER 3
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: codeType
          in: path
          type: string
          description: Type of code to search airport by (`iata` or `icao`)
        - name: code
          in: path
          type: string
          description: "If `codeType` is:\r"
          required: true
        - name: dateLocal
          in: path
          type: string
          description: "Local date at the airport (default = null).\r"
          required: true
    - name: flights-number-delays
      path: /flights/{number}/delays
      operations:
      - name: getflightdelays
        method: GET
        description: AeroDataBox Flight Delay Statistics by Flight Number / TIER 3
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: number
          in: path
          type: string
          description: Flight number (with or without spaces, IATA or ICAO, any case formats are acceptable, e.g. KL1395,
            Klm 1395)
          required: true
