    - name: aerodatabox-solar-and-day-time-2
      description: AeroDataBox Solar and Day Time at the Airport / TIER 1
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: aerodatabox-miscellaneous-api.getairportsolartimesolartimespecificdate
