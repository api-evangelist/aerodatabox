naftiko: 1.0.0-alpha2
info:
  label: AeroDataBox Flight Tracking
  description: 'Unified capability for real-time aviation intelligence combining flight status, aircraft data, and airport
    information. Enables developers and travel platforms to build comprehensive flight tracking, airport operations monitoring,
    and aircraft research applications. Primary persona: Developer or Travel Platform Engineer.'
  tags:
  - AeroDataBox
  - Aviation
  - Flight Tracking
  - Travel
  - Airport Operations
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AERODATABOX_API_KEY: AERODATABOX_API_KEY
capability:
  consumes:
  - type: http
    namespace: flight
    baseUri: https://prod.api.market/api/v1/aedbx/aerodatabox
    description: AeroDataBox Flight API for real-time and historical flight data.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{AERODATABOX_API_KEY}}'
      placement: header
    resources:
    - name: flight-status
      path: /flights/{searchBy}/{searchParam}
      description: Get current day flight status.
      operations:
      - name: get-flight-status
        method: GET
        description: Get flight status for the current day by flight number or other identifier.
        inputParameters:
        - name: searchBy
          in: path
          type: string
          required: true
          description: 'Search type: number, callsign, squawk.'
        - name: searchParam
          in: path
          type: string
          required: true
          description: The search value.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: airport-fids
      path: /flights/airports/{codeType}/{code}/{fromLocal}/{toLocal}
      description: Get FIDS (departures and arrivals) for an airport.
      operations:
      - name: get-airport-fids
        method: GET
        description: Get all flights departing and arriving at an airport in a time window.
        inputParameters:
        - name: codeType
          in: path
          type: string
          required: true
          description: 'Airport code type: iata or icao.'
        - name: code
          in: path
          type: string
          required: true
          description: The airport code.
        - name: fromLocal
          in: path
          type: string
          required: true
          description: Start of time window in local airport time.
        - name: toLocal
          in: path
          type: string
          required: true
          description: End of time window in local airport time.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: aircraft
    baseUri: https://prod.api.market/api/v1/aedbx/aerodatabox
    description: AeroDataBox Aircraft API for aircraft data and fleet information.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{AERODATABOX_API_KEY}}'
      placement: header
    resources:
    - name: aircraft
      path: /aircrafts/{searchBy}/{searchParam}
      description: Get aircraft information.
      operations:
      - name: get-aircraft
        method: GET
        description: Retrieve aircraft data by tail number, registration, or ICAO24.
        inputParameters:
        - name: searchBy
          in: path
          type: string
          required: true
          description: 'Search type: reg, hex, or similar.'
        - name: searchParam
          in: path
          type: string
          required: true
          description: The search value.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: airline-fleet
      path: /airlines/{airlineCode}/aircrafts
      description: Get airline fleet.
      operations:
      - name: get-airline-fleet
        method: GET
        description: Get all aircraft in an airline's fleet.
        inputParameters:
        - name: airlineCode
          in: path
          type: string
          required: true
          description: IATA airline code.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: airport
    baseUri: https://prod.api.market/api/v1/aedbx/aerodatabox
    description: AeroDataBox Airport API for airport data and location search.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{AERODATABOX_API_KEY}}'
      placement: header
    resources:
    - name: airport
      path: /airports/{codeType}/{code}
      description: Get airport data by code.
      operations:
      - name: get-airport
        method: GET
        description: Retrieve airport information by IATA or ICAO code.
        inputParameters:
        - name: codeType
          in: path
          type: string
          required: true
          description: 'Airport code type: iata or icao.'
        - name: code
          in: path
          type: string
          required: true
          description: Airport code.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: airport-search
      path: /airports/search/location
      description: Search airports by location.
      operations:
      - name: search-airports-by-location
        method: GET
        description: Find airports near a geographic coordinate.
        inputParameters:
        - name: lat
          in: query
          type: number
          required: true
          description: Latitude.
        - name: lon
          in: query
          type: number
          required: true
          description: Longitude.
        - name: radiusKm
          in: query
          type: number
          required: false
          description: Search radius in kilometers.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: aerodatabox-flight-tracking-api
    description: Unified REST API for AeroDataBox aviation data.
    resources:
    - path: /v1/flights/{searchBy}/{searchParam}
      name: flight-status
      description: Get flight status data.
      operations:
      - method: GET
        name: get-flight-status
        description: Track a flight by number.
        call: flight.get-flight-status
        with:
          searchBy: rest.searchBy
          searchParam: rest.searchParam
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/airports/{codeType}/{code}/flights
      name: airport-fids
      description: Get FIDS for an airport.
      operations:
      - method: GET
        name: get-airport-fids
        description: Get airport departures and arrivals.
        call: flight.get-airport-fids
        with:
          codeType: rest.codeType
          code: rest.code
          fromLocal: rest.fromLocal
          toLocal: rest.toLocal
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/airports/{codeType}/{code}
      name: airport
      description: Get airport information.
      operations:
      - method: GET
        name: get-airport
        description: Retrieve airport details.
        call: airport.get-airport
        with:
          codeType: rest.codeType
          code: rest.code
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/airports/search/location
      name: airport-search
      description: Search airports by location.
      operations:
      - method: GET
        name: search-airports
        description: Find nearby airports.
        call: airport.search-airports-by-location
        with:
          lat: rest.lat
          lon: rest.lon
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/aircrafts/{searchBy}/{searchParam}
      name: aircraft
      description: Get aircraft data.
      operations:
      - method: GET
        name: get-aircraft
        description: Look up an aircraft.
        call: aircraft.get-aircraft
        with:
          searchBy: rest.searchBy
          searchParam: rest.searchParam
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/airlines/{airlineCode}/aircrafts
      name: airline-fleet
      description: Get airline fleet.
      operations:
      - method: GET
        name: get-airline-fleet
        description: Get fleet for an airline.
        call: aircraft.get-airline-fleet
        with:
          airlineCode: rest.airlineCode
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9080
    namespace: aerodatabox-flight-tracking-mcp
    transport: http
    description: MCP server for AI-assisted aviation data queries using AeroDataBox.
    tools:
    - name: get-flight-status
      description: Track a flight in real-time by flight number or callsign.
      hints:
        readOnly: true
        openWorld: true
      call: flight.get-flight-status
      with:
        searchBy: tools.searchBy
        searchParam: tools.searchParam
      outputParameters:
      - type: object
        mapping: $.
    - name: get-airport-departures-arrivals
      description: Get all departures and arrivals at an airport for a time window.
      hints:
        readOnly: true
        openWorld: true
      call: flight.get-airport-fids
      with:
        codeType: tools.codeType
        code: tools.code
        fromLocal: tools.fromLocal
        toLocal: tools.toLocal
      outputParameters:
      - type: object
        mapping: $.
    - name: get-airport
      description: Get details for an airport by IATA or ICAO code.
      hints:
        readOnly: true
        openWorld: true
      call: airport.get-airport
      with:
        codeType: tools.codeType
        code: tools.code
      outputParameters:
      - type: object
        mapping: $.
    - name: search-airports-near-location
      description: Find airports near a geographic location.
      hints:
        readOnly: true
        openWorld: true
      call: airport.search-airports-by-location
      with:
        lat: tools.lat
        lon: tools.lon
      outputParameters:
      - type: object
        mapping: $.
    - name: get-aircraft
      description: Look up aircraft details by tail number or ICAO24 hex code.
      hints:
        readOnly: true
        openWorld: true
      call: aircraft.get-aircraft
      with:
        searchBy: tools.searchBy
        searchParam: tools.searchParam
      outputParameters:
      - type: object
        mapping: $.
    - name: get-airline-fleet
      description: Get all aircraft in an airline's fleet.
      hints:
        readOnly: true
        openWorld: true
      call: aircraft.get-airline-fleet
      with:
        airlineCode: tools.airlineCode
      outputParameters:
      - type: object
        mapping: $.
