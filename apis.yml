description: >-
  AeroDataBox is an affordable aviation and flight data API platform tailored
  for small and medium businesses, individual developers, researchers, and students.
  Founded in 2019, the platform provides real-time and historical flight status,
  aircraft information, airport data, delay statistics, and flight alert webhooks
  through a RESTful API available on RapidAPI and API.Market. AeroDataBox covers
  global aviation data across airlines, aircraft, airports, and flight operations.
specificationVersion: '0.16'
maintainers:
  - FN: API Evangelist
    url: http://apievangelist.com
    email: info@apievangelist.com
apis:
  - aid: aerodatabox:aerodatabox-flight-api
    name: AeroDataBox Flight API
    tags:
      - Flights
      - Flight Status
      - FIDS
      - Real-Time
      - Aviation
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://prod.api.market/api/v1/aedbx/aerodatabox
    humanURL: https://doc.aerodatabox.com/
    description: >-
      Provides real-time and historical flight status information including departure
      and arrival times, delays, codeshares, and flight number lookups. Supports
      FIDS (Flight Information Display System) data for airports and individual
      flight tracking by flight number, IATA/ICAO codes, and date ranges.
    properties:
      - url: https://doc.aerodatabox.com/
        type: Documentation
      - url: openapi/aerodatabox-openapi.yml
        type: OpenAPI
  - aid: aerodatabox:aerodatabox-aircraft-api
    name: AeroDataBox Aircraft API
    tags:
      - Aircraft
      - Tail Numbers
      - Fleet
      - Airlines
      - Aviation
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://prod.api.market/api/v1/aedbx/aerodatabox
    humanURL: https://doc.aerodatabox.com/
    description: >-
      Search and retrieve aircraft information by tail number, registration, or
      ICAO24 hex code. Includes airline fleet lookups, aircraft registration history,
      and aircraft images. Supports searches by term for active aircraft registrations.
    properties:
      - url: https://doc.aerodatabox.com/
        type: Documentation
      - url: openapi/aerodatabox-openapi.yml
        type: OpenAPI
  - aid: aerodatabox:aerodatabox-airport-api
    name: AeroDataBox Airport API
    tags:
      - Airports
      - Runways
      - Location Search
      - Aviation
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://prod.api.market/api/v1/aedbx/aerodatabox
    humanURL: https://doc.aerodatabox.com/
    description: >-
      Retrieve airport information by IATA/ICAO code including runway data, local
      time, solar time, and distance calculations between airports. Search airports
      by geographic location, IP address geolocation, or free-text term.
    properties:
      - url: https://doc.aerodatabox.com/
        type: Documentation
      - url: openapi/aerodatabox-openapi.yml
        type: OpenAPI
  - aid: aerodatabox:aerodatabox-statistical-api
    name: AeroDataBox Statistical API
    tags:
      - Delays
      - Statistics
      - Routes
      - Historical Data
      - Aviation
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://prod.api.market/api/v1/aedbx/aerodatabox
    humanURL: https://doc.aerodatabox.com/
    description: >-
      Access current and historical airport delay statistics, global delay summaries,
      daily route statistics, and flight delay data by flight number. Supports date
      range queries for trend analysis and performance benchmarking.
    properties:
      - url: https://doc.aerodatabox.com/
        type: Documentation
      - url: openapi/aerodatabox-openapi.yml
        type: OpenAPI
  - aid: aerodatabox:aerodatabox-flight-alert-api
    name: AeroDataBox Flight Alert API
    tags:
      - Webhooks
      - Alerts
      - Subscriptions
      - Real-Time
      - Aviation
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://prod.api.market/api/v1/aedbx/aerodatabox
    humanURL: https://doc.aerodatabox.com/
    description: >-
      Create, manage, and monitor webhook subscriptions for real-time flight status
      alerts. Subscribe to flight events by flight number or airport and receive
      push notifications to your endpoint when flight status changes occur.
    properties:
      - url: https://doc.aerodatabox.com/
        type: Documentation
      - url: openapi/aerodatabox-openapi.yml
        type: OpenAPI
