specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: AeroDataBox
providerId: aerodatabox
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: AeroDataBox is billed via API marketplaces (RapidAPI, api.market). The marketplace is
  the publisher/invoice issuer; AeroDataBox is the underlying data provider.
tags:
  - FinOps
  - FOCUS
  - Aviation
  - Flights
description: 'FOCUS-aligned FinOps for AeroDataBox: marketplace-mediated tiered subscription with
  monthly quota and overage.'
sources:
  - https://rapidapi.com/aedbx-aedbx/api/aerodatabox
  - https://prod.api.market/api/v1/aedbx/aerodatabox
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: API Marketplace (RapidAPI / api.market)
serviceCategory: Aviation Data
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
focusColumns:
  ServiceName: AeroDataBox
  ServiceCategory: Aviation Data
  ProviderName: AeroDataBox
  PublisherName: RapidAPI / api.market
  InvoiceIssuerName: RapidAPI / api.market
  BillingCurrency: USD
meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - endpoint_group
      - tier
  - name: monthly_quota
    unit: request
    aggregation: max
    dimensions:
      - tier
  - name: overage_requests
    unit: request
    aggregation: sum
    dimensions:
      - tier
  - name: subscription_fees
    unit: month
    aggregation: sum
    dimensions:
      - tier
principles:
  - name: Visibility
    description: Use the marketplace dashboard (RapidAPI Hub or api.market) to monitor request
      counts, quota burn-down, and overage exposure.
  - name: Allocation
    description: Issue separate API keys per consuming team/product to attribute usage.
  - name: Optimization
    description: Cache static lookups (airports, aircraft); right-size tier monthly; drop unused
      endpoints from polling loops.
  - name: Accountability
    description: Assign a tier-renewal owner; review monthly quota utilization and overage spend.
