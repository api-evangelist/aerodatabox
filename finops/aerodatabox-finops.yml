      - Fleet
      - Airlines
      - Aviation
    serviceName: AeroDataBox Aircraft API
    serviceCategory: API
  - name: AeroDataBox Airport API
    baseURL: https://prod.api.market/api/v1/aedbx/aerodatabox
    tags:
      - Airports
      - Runways
      - Location Search
      - Aviation
    serviceName: AeroDataBox Airport API
    serviceCategory: API
  - name: AeroDataBox Statistical API
    baseURL: https://prod.api.market/api/v1/aedbx/aerodatabox
    tags:
      - Delays
