          minLength: 1
          type: string
          description: Type of subscriber. Completemented by SubscriberId.
        id:
          minLength: 1
          type: string
          description: ID
      additionalProperties: false
      description: Describes subscriber (consumer of the subscription)
    SubscriptionBalanceContract:
      required:
        - creditsRemaining
        - lastDeductedUtc
        - lastRefilledUtc
      type: object
      properties:
        creditsRemaining:
          type: integer
          description: Alert credits remaining for the account.
          format: int64
        lastRefilledUtc:
          type: string
          description: The datetime when the balance was last re-filled, in UTC.
          format: date-time
        lastDeductedUtc:
          type: string
          description: "The datetime when the balance was last deducated, in UTC.\r

            Deduction typically occurs when an alert notification was
            dispatched\r

            for one of the alert subscriptions associated with the user
            account."
          format: date-time
      additionalProperties: false
      description: "Represents the balance for all alert subscriptions associated with
        the user acount, including remaining credits and timestamps\r

        for the most recent refill and deduction operations."
    SubscriptionBillingType:
      enum:
        - LifetimeBased
        - CreditBased
      type: string
      description: "Flight alert subscription billing type<p>Possible values:</p>\r

        <ul>\r

        <li><b>0 - LifetimeBased</b>: Subscription billed upon creation based on
        the life-time with set expiration date-time (BEING DEPRECATED)</li>\r

        <li><b>1 - CreditBased</b>: Subscription with no expiration date, billed
        based on the amount of notifications sent</li>\r

        </ul>\r\n"
    SubscriptionContract:
      required:
        - createdOnUtc
        - id
        - isActive
        - subject
        - subscriber
      type: object
      properties:
        id:
          type: string
          description: "Identifier of a subscription. \r

            Use this ID to control the subscription in future (e.g. update or
            delete)."
          format: uuid
        isActive:
          type: boolean
          description: Specifies if the subscription is active
        billingType:
          $ref: "#/components/schemas/SubscriptionBillingType"
        activateBeforeUtc:
          type: string
          description: "Time (UTC) before which subscription must be activated (may be
            applicable to \r

            some non-active newly created subscriptions)"
          format: date-time
          nullable: true
        expiresOnUtc:
          type: string
          description: "Time (UTC) when subscription expires and will be removed.\r

            \r

            If not specified, subscription never expires."
          format: date-time
          nullable: true
        createdOnUtc:
          type: string
          description: Time (UTC) when subscription was created
          format: date-time
        subject:
          $ref: "#/components/schemas/SubscriptionSubjectContract"
        subscriber:
          $ref: "#/components/schemas/SubscriberContract"
        notices:
          type: array
          items:
            type: string
          description: Additional messages
          nullable: true
      additionalProperties: false
      description: Describes subscription
    SubscriptionSubjectContract:
      required:
        - type
      type: object
      properties:
        type:
          $ref: "#/components/schemas/SubscriptionSubjectType"
        id:
          type: string
          description: "Subject ID of a subscription. Complements SubjectType.\r

            \r

            E.g. SubjectType = \"FlightNumber\" and SubjectId = \"DL 47\" means
            that this\r

            subscription is for all updates of flight with number DL47."
          nullable: true
      additionalProperties: false
      description: Describes subscription subject
    SubscriptionSubjectType:
      enum:
        - FlightByNumber
        - FlightByAirportIcao
      type: string
      description: "<p>Possible values:</p>\r

        <ul>\r

        <li><b>0 - FlightByNumber</b></li>\r

        <li><b>1 - FlightByAirportIcao</b></li>\r

        </ul>\r\n"
    SubscriptionsBalanceRefillRequestContract:
      required:
