        utc:
          type: string
          description: UTC-time
          format: date-time
        local:
          type: string
          description: Local time
          format: date-time
      additionalProperties: false
      description: Descriptor date-time represented in both UTC and local timezones
    DayTime:
      enum:
        - Night
        - TwilightAstronomical
        - TwilightNautical
        - TwilightCivil
        - Day
        - BlueHour
        - GoldenHour
      type: string
      description: "Daytime states<p>Possible values:</p>\r

        <ul>\r

        <li><b>0 - Night</b></li>\r

        <li><b>1 - TwilightAstronomical</b></li>\r

        <li><b>2 - TwilightNautical</b></li>\r

        <li><b>3 - TwilightCivil</b></li>\r

        <li><b>4 - Day</b></li>\r

        <li><b>5 - BlueHour</b></li>\r

        <li><b>6 - GoldenHour</b></li>\r

        </ul>\r\n"
    DelayBracketContract:
      required:
        - num
      type: object
      properties:
        delayedFrom:
          type: string
          description: "The beginning of the delay range (format: [-]hh:mm:ss).\r

            E.g. in the expresssion \"delayed from 30 to 60 minutes\" stands for
            \"from 30 minutes\".\r

            Value can be negative (therefore, means early occurence).\r

            \r

            Must be preset if \"DelayedTo\" is not specified."
          format: date-span
          nullable: true
        delayedTo:
          type: string
          description: "The end of the delay range (format: [-]hh:mm:ss).\r

            E.g. in the expresssion \"delayed from 30 to 60 minutes\" stands for
            \"to 60 minutes\".\r

            Value can be negative (therefore, means early occurence).\r

            \r

            Must be preset if \"DelayedFrom\" is not specified."
          format: date-span
          nullable: true
        num:
          type: integer
          description: Count of records subject to a specified delay range
          format: int32
        percentage:
          type: number
          description: "Percentage of records subject to a specified delay range.\r

            \r

            Only available when this delay bracket is provided as a part\r

            of a statistical information of a bigger context and the \"total\"\r

            count of records is known."
          format: float
          nullable: true
      additionalProperties: false
      description: Delay bracket contract describing how many records are subject to a
        specific delay range
    Distance:
      required:
        - feet
        - km
        - meter
        - mile
        - nm
      type: object
      properties:
        meter:
          type: number
          description: Distance in meters
          format: double
        km:
          type: number
          description: Distance in kilometers
          format: double
        mile:
          type: number
          description: Distance in statute miles
          format: double
        nm:
          type: number
          description: Distance in nautical miles
          format: double
        feet:
          type: number
          description: Distance in feet
          format: double
      additionalProperties: false
    DistanceFlightPlanUnitContract:
      type: object
      properties:
        requested:
          $ref: "#/components/schemas/Distance"
        assigned:
          $ref: "#/components/schemas/Distance"
      additionalProperties: false
      description: "Contract describing unit (altitude, airspeed, etc.) which can be
        assigned and / or requested\r

        in the context of the flight plan"
    EngineType:
      enum:
        - Unknown
        - Jet
        - Turboprop
        - Piston
      type: string
      description: "<p>Possible values:</p>\r

        <ul>\r

        <li><b>0 - Unknown</b></li>\r

        <li><b>1 - Jet</b></li>\r

        <li><b>2 - Turboprop</b></li>\r

        <li><b>3 - Piston</b></li>\r

        </ul>\r\n"
    ErrorContract:
      required:
        - message
      type: object
      properties:
        message:
          minLength: 1
          type: string
          description: Error message
      additionalProperties: false
      description: Error response
    FaaLaddAircraftStatusContract:
      required:
        - id
        - isBlocked
      type: object
      properties:
        id:
          type: string
          format: string
        isBlocked:
          type: boolean
          description: Current status of the aircraft / flight in the FAA LADD industry
            list.
        blockedSince:
          type: string
          description: "For blocked aircraft only: the date when the aircraft / flight was
            blocked.\r

            Will not be included for blocked dates at or prior to September 15,
            2024."
          format: date-time
          nullable: true
        lastBlockedOn:
          type: string
          description: "For unblocked aircraft only: the date when the aircraft / flight
            was last blocked.\r

            Will not be included for blocked dates at or prior to September 15,
            2024 or \r

            for the aircraft that were never blocked."
          format: date-time
          nullable: true
      additionalProperties: false
      description: "Status of the aircraft tail number or callsign in the FAA Limiting
        Aircraft Data Displayed (LADD) Program list.\r

        See https://www.faa.gov/pilots/ladd for more details."
    FeedServiceEnum:
      enum:
        - FlightSchedules
        - FlightLiveUpdates
        - AdsbUpdates
      type: string
      description: "Airport feed service defininitions<p>Possible values:</p>\r

        <ul>\r

        <li><b>0 - FlightSchedules</b>: Flight schedules data feed for this
        airport (static schedules data without actual updates)</li>\r

        <li><b>1 - FlightLiveUpdates</b>: Actual flight status and time updates
        for this airport</li>\r

        <li><b>2 - AdsbUpdates</b>: Flight updates derived from ADS-B data for
        this airport: runway, actual/estimated time on the runway, call-sign,
        ModeS 24-bit ICAO code, aircraft registration</li>\r

        </ul>\r\n"
    FeedServiceStatus:
      enum:
        - Down
        - Degraded
        - OKPartial
        - OK
        - Unknown
        - Unavailable
      type: string
      description: "Descriptor of feed service status<p>Possible values:</p>\r

        <ul>\r

        <li><b>0 - Down</b>: Service is provided, but is currently down</li>\r

        <li><b>1 - Degraded</b>: Service is up and running, but performance is
        degraded: delays and disruptions are likely</li>\r

        <li><b>2 - OKPartial</b>: Service is up and running normally, but
        updates vailable for not all or only few flights</li>\r

        <li><b>3 - OK</b>: Service is up and running normally</li>\r

        <li><b>-2 - Unknown</b>: Status of service is unknown</li>\r

        <li><b>-1 - Unavailable</b>: Service is not provided</li>\r

        </ul>\r\n"
    FeedServiceStatusContract:
      required:
        - service
        - status
      type: object
