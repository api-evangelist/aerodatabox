  /subscriptions/webhook/{subjectType}/{subjectId}:
    post:
      tags:
        - Flight Alert API
      summary: Create web-hook subscription / TIER 4
      description: "*This endpoitns is a part of Flight alert PUSH API currently
        powered by webhooks.  \r

        If you are running your own web service, you can subscribe to flights by
        number or airport code. \r

        After that, your HTTP endpoint will be called (notified) whenever the
        flight information gets \r

        updated.*\r

        \r

        Creates a web-hook subscription on a subject (e.g., flight alerts by
        number or by airport code).\r

        Returns information about created subscription. Subscription ID
        contained in it\r

        can be used to refresh or remove it.\r

        \r

        Every time a subject gets updated, a HTTP request will be sent to\r

        the URL specified in `url` parameter. Request will be of a POST type \r

        and contain JSON-formatted `FlightNotificationContract` object
        containing subscription\r

        and flights information in  the body (see example response for status
        code 199\r

        of this endpoint documentation).\r

        \r

        All flight alerts / notifications are delivered in best-effort manner.
        They might be missing\r

        or delayed. If there was an error delivering a notification for any
        reason, for example, your\r

        endpoint was not available, returned non-2xx status code, or did not
        respond within timeout period,\r

        there will be 2 more retries after 5 and 15 minutes (**this behavior is
        changing, see below**).\r

        \r

        If subscribed to a specific flight or to flights operated in a specific
        airport:\r

        * Ensure that the flight is within the live updates / ADS-B data
        coverage. There is no sense in subscribing to a flight which operates in
        airports having poor or  no live updates or ADS-B coverage: there simply
        will be no updates. To check if an airport is tracked and on which
        level, use `/health/services/airports/{icao}/feeds` endpoint. You can
        also use `/health/services/feeds/{service}/airports` to get the list of
        covered airports. Read more about coverage here:
        https://www.aerodatabox.com/data-coverage.\r

        * Notifications will cover updates for flights commencing from 6 hours
        ago up to 72 hours in future.\r

        * Among these, notifications will contain only those flight items which
        were actually updated this time.\r

        \r

        ** ! WARNING OF THE UPCOMING BREAKING CHANGES ! **\r

        \r

        WE ARE CHANGING HOW WEB-HOOK SUBSCRIPTION BILLING AND NOTIFICATION RETRY
        IS HANDLED. \r

        \r

        If you're already using Flight Alert API you need to adjust your code to
        prevent service interruption.\r

        \r

        **CURRENT BEHAVIOR (BEING PHASED OUT):**\r

        \r

        * Web-hook subscriptions created using this endpoint have a life-time of
        7 days. Expiration date-time is provided in the response to this
        endpoint. \r

        * After that expiration date the subscription will be removed
        automatically. If you want to prevent expiration and extend the
        subscription, use `PATCH /webhook/{subscriptionId}/refresh` endpoint to
        refresh the subscription. You may also remove the subscription manually
        using DELETE `webhook/{subscriptionId}`.\r

        * As long as a web-hook subscription is active, you will receive
        notifications if there are any.\r

        * You are billed for every call when you create or refresh a
        subscription as per Tier 4 API quota.\r

        * You are **not** billed for the amount of notifications generated or
        delivered to you.\r

        * You may **not** be refunded for unused time on your subscription if
        you remove it manually before expiration or if there were no
        notifications.\r

        * Each failed notification delivery attempt is retried 2 times by
        default, regardless of the reason of failure.\r

        \r

        **UPCOMING BEHAVIOR:**\r

        \r

        * Web-hook subscriptions no longer expire, unless you remove them
        manually.\r

        * This endpoint is moved to the Free Tier and both creating and
        refreshing subscriptions will be free of charge.\r

        * Every API consumer will now have a dedicated flight alert credit
        balance separate from the API quota. \r

        * Credits are deducted from your balance each time an alert notification
        is sent to your webhook. The cost is 1 credit per flight item in the
        notification. If a notification contains 1 flight, it costs 1 credit. If
        a notification contains 5 flights (common with airport subscriptions),
        it costs 5 credits.\r

        * Use caution when subscribing to an airport with a lot of traffic, as
        it may drain your balance quickly.\r

        * As soon as your balance reaches zero, all your web-hook subscriptions
        will pause and no notifications will be sent until you refill your
        balance.The balance is shared among all web-hook subscriptions created
        by you.\r

        * To refill the balance, refer to `POST /subscriptions/balance/refill`
        API endpoint.\r

        * To check the balance, refer to `GET /subscriptions/balance`
        endpoint.\r

        * `PATCH /webhook/{subscriptionId}/refresh` is now deprecated will be
        removed after the transition period. Pricing Tier 4 will be discontinued
        too.\r

        * Each failed notification delivery attempt is not retried by default,
        unless you explicitly set amount of retries when creating the
        subscription using `maxDeliveryRetries` parameter in the request body.\r

        * Each retry attempt costs the same amount of credits as the original
        notification delivery attempt.\r

        \r

        **WHEN THE CHANGE WILL HAPPEN?**\r

        \r

        * Transition period will end on **the 4th of April, 2026**. Both systems
        will co-exist during the transition period until then. After that date
        only the credit-based billing system will remain operational. \r

        \r

        **MIGRATION GUIDE / LEARN MORE**\r

        \r

        Read our guide at https://aerodatabox.com/flight-alert-api-2026/"
      operationId: SubscribeWebhook
      parameters:
        - name: subjectType
          in: path
          description: Subject type
          schema:
            $ref: "#/components/schemas/SubscriptionSubjectType"
        - name: subjectId
          in: path
          description: "Subject ID. If `subjectType` is: \r

            * `FlightByNumber`, then this field must be a flight number (with or
            without spaces, IATA or ICAO, any case formats are acceptable, e.g.
            KL1395, Klm 1395);\r

            * `FlightByAirportIcao`, then this field must be a 4-character
            ICAO-code of the airport where flights are operated (e.g.: EHAM,
            KLAX, UUEE, etc.);"
          required: true
          schema:
            type: string
        - name: useCredits
          in: query
          description: "THIS IS A TEMPORARY MIGRATION PARAMETER FOR EASIER TRANSITION. \r

            Default value: false.\r

            Set to true to create a web-hook subscription under the new,
            credit-based billing model.In this case, the call will be free of
            charge despite Tier 4.\r

            After transition this parameter will be ignored as all subscriptions
            will be created as credit-based and you will be able to remove it."
          schema:
            type: boolean
            default: false
      requestBody:
        description: Command containing parameters for web-hook subscription creation
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebHookSubscription"
      responses:
        "199":
          description: Information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlightNotificationContract"
            application/xml:
              schema:
                $ref: "#/components/schemas/FlightNotificationContract"
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionContract"
            application/xml:
              schema:
                $ref: "#/components/schemas/SubscriptionContract"
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorContract"
            application/xml:
              schema:
                $ref: "#/components/schemas/ErrorContract"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorContract"
            application/xml:
              schema:
                $ref: "#/components/schemas/ErrorContract"
        "451":
          description: Unavailable For Legal Reasons
          content:
