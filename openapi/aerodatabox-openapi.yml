        <li><b>4 - Dirt</b></li>\r

        <li><b>5 - Gravel</b></li>\r

        <li><b>6 - DryLakebed</b></li>\r

        <li><b>7 - Water</b></li>\r

        <li><b>8 - Snow</b></li>\r

        </ul>\r\n"
