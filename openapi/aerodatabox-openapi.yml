components:
  schemas:
    AircraftContract:
      required:
        - active
        - id
        - isFreighter
        - numRegistrations
        - reg
        - verified
      type: object
      properties:
        id:
          type: integer
          description: Unique ID of the aircraft record in our database
          format: int64
        reg:
          minLength: 1
          type: string
          description: Tail-number of the aircraft
        active:
          type: boolean
          description: Indicator if aircraft is operational under this registration
        serial:
          type: string
          description: Serial number
          nullable: true
        hexIcao:
          type: string
          description: ICAO 24 bit Mode-S hexadecimal transponder address
          nullable: true
        airlineName:
          type: string
          description: Name of the airline operating the aircraft
          nullable: true
        iataType:
          type: string
          description: IATA-type of the aircraft
          nullable: true
        iataCodeShort:
          type: string
          description: Short variant of IATA-code of the aircraft
          nullable: true
        icaoCode:
          type: string
          description: ICAO-code of the aircraft
          nullable: true
        model:
          type: string
          description: Model of the aircraft
          nullable: true
        modelCode:
          type: string
          description: Model code of the aircraft
          nullable: true
        numSeats:
          type: integer
          description: Number of passenger seats
          format: int32
          nullable: true
        rolloutDate:
          type: string
          description: Date of roll-out (UTC)
          format: date-time
          nullable: true
        firstFlightDate:
          type: string
          description: First flight date
          format: date-time
          nullable: true
        deliveryDate:
          type: string
          description: Date of delivery to the owner
          format: date-time
          nullable: true
        registrationDate:
          type: string
          description: Date of assigning current registration
          format: date-time
          nullable: true
        typeName:
          type: string
          description: Type name
          nullable: true
        numEngines:
          type: integer
          description: Number of engines
          format: int32
          nullable: true
        engineType:
          $ref: "#/components/schemas/EngineType"
        isFreighter:
          type: boolean
          description: Marker if aircraft is cargo or not
        productionLine:
          type: string
          description: Production line
          nullable: true
        ageYears:
          type: number
          description: Age of the aircraft in year
          format: float
          nullable: true
        verified:
          type: boolean
        image:
          $ref: "#/components/schemas/ResourceContract"
        numRegistrations:
          type: integer
          description: "An aircraft may have a history of past registrations with other
            airlines or operators.\r

            This field represents a total number of registration records known
            in our database."
          format: int32
        registrations:
          type: array
          items:
            $ref: "#/components/schemas/AircraftRegistrationContract"
          description: A history of all registrations with other airlines or operators (if
            provided by the endpoint).
          nullable: true
      additionalProperties: false
      description: Single aircraft data
    AircraftContractPagedCollectionContract:
      required:
        - count
        - hasNextPage
        - items
        - pageOffset
        - pageSize
        - totalCount
      type: object
      properties:
        totalCount:
          maximum: 2147483647
          minimum: 0
          type: integer
          description: The total number of items across all pages
          format: int32
        pageOffset:
          maximum: 2147483647
          minimum: 0
          type: integer
          description: "The offset of the current page of the collection \r

            (number of items skipped before this page)"
          format: int32
        pageSize:
          maximum: 2147483647
          minimum: 0
          type: integer
          description: "Maximum number of items on the current page of the collection\r

            (`Count` cannot be more than this value)"
          format: int32
        hasNextPage:
          type: boolean
          description: This value is true when collection has more pages
          readOnly: true
        count:
          maximum: 2147483647
          minimum: 0
          type: integer
          description: The number of items in the collection
          format: int32
          readOnly: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/AircraftContract"
          description: The collection of items
      additionalProperties: false
    AircraftRegistrationContract:
      required:
        - active
        - reg
      type: object
      properties:
        reg:
          minLength: 1
          type: string
          description: Tail-number of the aircraft
        active:
          type: boolean
          description: Indicator if aircraft is operational under this registration
        hexIcao:
          type: string
          description: ICAO 24 bit Mode-S hexadecimal transponder address
          nullable: true
        airlineName:
          type: string
          description: Name of the airline operating the aircraft
          nullable: true
        registrationDate:
          type: string
          description: Date of assigning current registration
          format: date-time
          nullable: true
      additionalProperties: false
      description: Aircraft registration data
    AircraftSearchByEnum:
      enum:
        - Id
        - Reg
        - Icao24
      type: string
      description: "Criteria to search aircraft by<p>Possible values:</p>\r

        <ul>\r

        <li><b>0 - Id</b>: ID of the aircraft (as stored in this API)</li>\r

        <li><b>1 - Reg</b>: Search by aircraft tail-number</li>\r

        <li><b>2 - Icao24</b>: Search by 24-bit ICAO Mode-S Transponder
        code</li>\r

        </ul>\r\n"
    AirportCodesByEnum:
      enum:
        - Icao
        - Iata
      type: string
      description: "Search by airport code type<p>Possible values:</p>\r

        <ul>\r

        <li><b>0 - Icao</b>: ICAO-code</li>\r

        <li><b>1 - Iata</b>: IATA-code</li>\r

        </ul>\r\n"
    AirportContract:
      required:
        - continent
        - country
        - elevation
        - fullName
        - location
        - timeZone
        - urls
      type: object
      properties:
        icao:
          type: string
          description: ICAO code of the airport
          nullable: true
        iata:
          type: string
          description: IATA code of the airport
          nullable: true
        localCode:
          type: string
          description: Code of the airport within the local or national coding system
          nullable: true
        shortName:
          type: string
          description: Shortened name of the airport
          nullable: true
        fullName:
          minLength: 1
          type: string
          description: Full name of the airport (derived from own airport name and
            municipality name)
        municipalityName:
          type: string
          description: Name of the municipality this airport belongs to
          nullable: true
        location:
          $ref: "#/components/schemas/GeoCoordinatesContract"
        elevation:
          $ref: "#/components/schemas/Distance"
        country:
          $ref: "#/components/schemas/CountryContract"
        continent:
          $ref: "#/components/schemas/ContinentContract"
        timeZone:
          minLength: 1
          type: string
          description: Time zone of the airport in Olson format (e.g. "Europe/Amsterdam")
        urls:
          $ref: "#/components/schemas/AirportUrlsContract"
        runways:
          type: array
          items:
            $ref: "#/components/schemas/RunwayContract"
          description: List of runway information, if requested
          nullable: true
        currentTime:
          $ref: "#/components/schemas/AirportLocalTimeContract"
      additionalProperties: false
      description: Single airport data
    AirportDelayContract:
      required:
        - airportIcao
        - arrivalsDelayInformation
        - departuresDelayInformation
        - from
        - to
      type: object
      properties:
        airportIcao:
          minLength: 1
          type: string
          description: Airport ICAO code
        from:
          $ref: "#/components/schemas/DateTimeContract"
        to:
          $ref: "#/components/schemas/DateTimeContract"
        departuresDelayInformation:
          $ref: "#/components/schemas/FlightBatchDelayContract"
        arrivalsDelayInformation:
          $ref: "#/components/schemas/FlightBatchDelayContract"
      additionalProperties: false
    AirportDistanceTimeContract:
      required:
        - approxFlightTime
        - from
        - greatCircleDistance
        - to
      type: object
      properties:
        from:
          $ref: "#/components/schemas/ListingAirportContract"
        to:
          $ref: "#/components/schemas/ListingAirportContract"
        greatCircleDistance:
          $ref: "#/components/schemas/Distance"
        approxFlightTime:
          type: string
          description: "Approximate flight time based on re-calculation of great circle
            distance\r

            against statistical duration average of multiple flights covered
            similar\r

            distance before."
          format: date-span
      additionalProperties: false
      description: "Contract containing information on distance and approximate flight
        time\r

        between specified airports"
    AirportFeedServiceStatusContract:
      required:
        - adsbUpdatesFeed
        - flightSchedulesFeed
        - generalAvailability
        - liveFlightUpdatesFeed
      type: object
      properties:
        flightSchedulesFeed:
          $ref: "#/components/schemas/FeedServiceStatusContract"
        liveFlightUpdatesFeed:
          $ref: "#/components/schemas/FeedServiceStatusContract"
        adsbUpdatesFeed:
          $ref: "#/components/schemas/FeedServiceStatusContract"
        generalAvailability:
          $ref: "#/components/schemas/FlightDataGeneralAvailabilityContract"
      additionalProperties: false
      description: "Airport data feed services status.\r

        Read https://aerodatabox.com/data-coverage for context."
    AirportFidsContract:
      type: object
      properties:
        departures:
          type: array
          items:
            $ref: "#/components/schemas/AirportFlightContract"
          description: Departing flights
          nullable: true
        arrivals:
          type: array
          items:
            $ref: "#/components/schemas/AirportFlightContract"
          description: Arriving flights
          nullable: true
      additionalProperties: false
      description: Airport schedule contract
    AirportFlightContract:
      required:
        - codeshareStatus
        - isCargo
        - number
        - status
      type: object
      properties:
        movement:
          $ref: "#/components/schemas/FlightAirportMovementContract"
        departure:
          $ref: "#/components/schemas/FlightAirportMovementContract"
        arrival:
          $ref: "#/components/schemas/FlightAirportMovementContract"
        number:
          minLength: 1
          type: string
          description: Flight Number
        callSign:
          type: string
          description: ATC call-sign of the flight
          nullable: true
        status:
          $ref: "#/components/schemas/FlightStatus"
        codeshareStatus:
          $ref: "#/components/schemas/CodeshareStatus"
        isCargo:
          type: boolean
          description: Is cargo flight
        aircraft:
          $ref: "#/components/schemas/FlightAircraftContract"
        airline:
          $ref: "#/components/schemas/FlightAirlineContract"
        location:
          $ref: "#/components/schemas/FlightLocationContract"
      additionalProperties: false
      description: Flight data contract represented in airport schedule
    AirportLocalTimeContract:
      required:
        - time
        - timeZoneId
      type: object
      properties:
        time:
          $ref: "#/components/schemas/DateTimeContract"
        timeZoneId:
          minLength: 1
          type: string
          description: Timezone ID of the airport (Olson format)
      additionalProperties: false
      description: Information about the local time at an airport
    AirportUrlsContract:
      type: object
      properties:
        webSite:
          type: string
          description: Main web-site of the airport
          nullable: true
        wikipedia:
          type: string
          description: Wikipedia page of the airport
          nullable: true
        twitter:
          type: string
          description: Twitter feed of the airport
          nullable: true
        liveAtc:
          type: string
          description: LiveAtc page of the airport
          nullable: true
        flightRadar:
          type: string
          description: FlightRadar page of the airport
          nullable: true
        googleMaps:
          type: string
          description: Google Maps URL of the airport
          nullable: true
      additionalProperties: false
      description: Airport URLs contract
    Angle:
      required:
        - deg
        - rad
      type: object
      properties:
        deg:
          maximum: 180
          minimum: -180
          type: number
          description: Angle in degrees (between `-180` and `180`)
          format: double
        rad:
          maximum: 3.141592653589793
          minimum: -3.141592653589793
          type: number
          description: Angle in radians (between `-Pi` and `Pi`)
          format: double
      additionalProperties: false
    Azimuth:
      required:
        - deg
        - rad
      type: object
      properties:
        deg:
          maximum: 360
          minimum: 0
          type: number
          description: Angle in degrees (between `0` and `360`)
          format: double
        rad:
          maximum: 6.283185307179586
          minimum: 0
          type: number
          description: Angle in radians (`0` and `2 * Pi`)
          format: double
      additionalProperties: false
    CodeshareStatus:
      enum:
        - Unknown
        - IsOperator
        - IsCodeshared
      type: string
      description: "Flight code-share status<p>Possible values:</p>\r

        <ul>\r

        <li><b>0 - Unknown</b>: Code-sharing information is unavailable for this
        flight. Flight might be operated both by airline owning the flight
        number as well as by another airliner.</li>\r

        <li><b>1 - IsOperator</b>: Flight is operated by an airline owning the
        flight number (the same code)</li>\r

        <li><b>2 - IsCodeshared</b>: Flight is code-shared (operated by an
        airline other than airline owning the flight number)</li>\r

        </ul>\r\n"
    ContinentContract:
      required:
        - code
      type: object
      properties:
        code:
          minLength: 1
          type: string
          description: Code
        name:
          type: string
          description: Name
          nullable: true
      additionalProperties: false
      description: Continent data
    CountryContract:
      required:
        - code
      type: object
      properties:
        code:
          minLength: 1
          type: string
          description: Code
        name:
          type: string
          description: Name
          nullable: true
      additionalProperties: false
      description: Country data
    CreateWebHookSubscription:
      required:
        - url
      type: object
      properties:
        url:
          minLength: 1
          type: string
          description: "Destination HTTP-endpoint where notifications will be sent to.
            Requirements:\r

            * must be a valid public HTTP(S) URL not requiring additional
            authorization;\r

            * must use standard or alternative HTTP or HTTPS ports (80, 443,
            8008, 8080) or any dynamic port greater or equal to 49152;\r

            * must be able to accept HTTP POST request with JSON-formatted body
            (application/json);\r

            * must respond with one of successful HTTP status codes (2XX) within
            10 seconds;\r

            * the endpoint owner must be aware of and consent to receiving
            notifications at it.\r

            \r

            If endpoint is unavailable, responds with error status code or does
            not respond within timeout,\r

            notification delivery retry may be attempted according to
            subscription settings."
        maxDeliveryRetries:
          maximum: 2
          minimum: 0
          type: integer
          description: "Maximum number of times a delivery attempt is retried after
            initial delivery attempt failure.\r

            \r

            Current default value is:\r

            \r

            \t* `2` for the old, lifetime-based web-hook subscriptions (will be
            phased out after the 4th of April, 2026);\r

            \t* `0` for the new, credit-based web-hook subscriptions (will be
            the default value for any web-hook subscription after the 4th of
            April, 2026)."
          format: int32
          nullable: true
      additionalProperties: false
      description: Command to create web-hook subscription
    DailyRouteStatContract:
      required:
        - routes
      type: object
      properties:
        routes:
          type: array
          items:
            $ref: "#/components/schemas/DailyRouteStatRecordContract"
      additionalProperties: false
      description: Route daily statistics of the airport
    DailyRouteStatRecordContract:
      required:
        - averageDailyFlights
        - destination
        - operators
      type: object
      properties:
        destination:
          $ref: "#/components/schemas/ListingAirportContract"
        averageDailyFlights:
          type: number
          description: Daily average of flights per destination
          format: float
        operators:
          type: array
          items:
            $ref: "#/components/schemas/FlightAirlineContract"
          description: Airlines operating on the route
      additionalProperties: false
      description: Statistical record of route daily statistics
    DateTimeContract:
      required:
        - local
        - utc
