            (e.g. late from 15 to 30 minutes, from 30 to 60, etc.)"
        fromUtc:
          type: string
          description: The beginning of the time range within which flght delay
            information is calculated (represented in UTC time)
          format: date-time
        toUtc:
          type: string
          description: The end of the time range within which flght delay information is
            calculated (represented in UTC time)
          format: date-time
      additionalProperties: false
      description: Delay statistics for a flight movement
    FlightDirection:
