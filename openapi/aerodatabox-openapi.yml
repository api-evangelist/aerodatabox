  /airports/search/location:
    get:
      tags:
        - Airport API
      summary: Search airports by location / TIER 2
      description: "**What are the airports closest to the location?**\r

        \r

        At the moment airports having both ICAO and IATA code and flight
        schedules are present available only.\r

        \r

        *Returns:* A list of airports found within the specified radius around
        the specified location."
      operationId: SearchAirportsByLocation
      parameters:
        - name: lat
          in: query
          description: Latitude location coordinate in decimal format (between -90 and 90)
          required: true
          schema:
            type: number
            format: float
        - name: lon
          in: query
          description: Longitude location coordinate in decimal format (between -180 and
            180)
          required: true
          schema:
            type: number
            format: float
        - name: radiusKm
          in: query
          description: Radius of search around specified location in kilometers (max. 1000
            km)
          required: true
          schema:
            type: integer
            format: int32
        - name: limit
          in: query
          description: Maximum number of airports to be returned (max. 250)
          required: true
          schema:
            type: integer
            format: int32
        - name: withFlightInfoOnly
          in: query
          description: If set to true, will only return airports which have flight data
            (scheduled or live) available. Default = false.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeoCoordinatesContractListingAirportContractSearchR\
                  esultCollectionContract"
            application/xml:
              schema:
                $ref: "#/components/schemas/GeoCoordinatesContractListingAirportContractSearchR\
                  esultCollectionContract"
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorContract"
            application/xml:
              schema:
                $ref: "#/components/schemas/ErrorContract"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorContract"
            application/xml:
              schema:
                $ref: "#/components/schemas/ErrorContract"
        "451":
