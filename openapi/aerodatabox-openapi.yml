            \r

            The closer the value of this property to the value of `NumTotal`,
            the higher the\r

            reliability of delay information"
          format: int32
        numCancelled:
          type: integer
          description: Total amount of flights in the batch
          format: int32
        medianDelay:
          type: string
          description: "Median delay of flights in the batch (format: [-]hh:mm:ss).\r

            Value can be negative (therefore, means early occurence)."
          format: date-span
          nullable: true
        delayIndex:
          type: number
          description: Normalized value on scale from 0.0 to 5.0 which corresponds with
