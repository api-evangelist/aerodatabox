            you can expect within this contract (basic, live and/or approximate
            data)."
      additionalProperties: false
      description: Flight arrival or departure information
    FlightAirportMovementQualityEnum:
      enum:
        - Basic
        - Live
        - Approximate
      type: string
      description: "Quality characteristics of the information provided within flight
        FlightAirportMovementContract<p>Possible values:</p>\r

        <ul>\r

        <li><b>0 - Basic</b></li>\r

        <li><b>1 - Live</b></li>\r

        <li><b>2 - Approximate</b></li>\r

        </ul>\r\n"
    FlightBatchDelayContract:
