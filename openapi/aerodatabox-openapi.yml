              schema:
                $ref: "#/components/schemas/ErrorContract"
            application/xml:
              schema:
                $ref: "#/components/schemas/ErrorContract"
        "503":
          description: Service Unavailable
      x-badges:
        - name: TIER 4
          position: before
          color: "#8a8eb2"
    parameters:
      - *a1
