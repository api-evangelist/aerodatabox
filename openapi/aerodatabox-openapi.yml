        service:
          $ref: "#/components/schemas/FeedServiceEnum"
        status:
          $ref: "#/components/schemas/FeedServiceStatus"
        minAvailableLocalDate:
          type: string
          description: Date of the oldest flight stored (based on scheduled local times)
          format: date-time
          nullable: true
          deprecated: true
        maxAvailableLocalDate:
          type: string
          description: Date of the most recent flight stored (based on scheduled local
            times)
          format: date-time
          nullable: true
          deprecated: true
      additionalProperties: false
      description: "Feed service status contract.\r

        Read https://aerodatabox.com/data-coverage for context."
    FlightAircraftContract:
      type: object
