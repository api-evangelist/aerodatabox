        criteria without any manual intervention. \r

        Therefore, false matches may be returned. Only images with licenses
        approved for commercial use are returned. Please be advised that you may
        be required to mention author attribution before using the image.\r

        \r

        *Returns:* Image data with medium-sized direct image URL and licence
        approved for commercial use\r

        is returned."
      operationId: GetAircraftImageByRegistration
      parameters:
        - name: reg
          in: path
          description: Tail-number of the aircraft (full, stripped and any case formats
            are acceptable).
          required: true
          schema:
            type: string
      responses:
