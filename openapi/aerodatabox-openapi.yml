        CC0</li>\r

        <li><b>10 - PublicDomainMark</b>: Public Domain Mark</li>\r

        </ul>\r\n"
    ListingAirportContract:
      required:
        - name
      type: object
      properties:
        icao:
          type: string
          description: ICAO code of the airport
          nullable: true
        iata:
          type: string
          description: IATA code of the airport
          nullable: true
        localCode:
          type: string
          description: Code of the airport within the local or national codification system
          nullable: true
        name:
          minLength: 1
          type: string
          description: Name of the airport
        shortName:
          type: string
          description: Shortened name of the airport
          nullable: true
        municipalityName:
          type: string
          description: Name of the municipality this airport belongs to
          nullable: true
        location:
          $ref: "#/components/schemas/GeoCoordinatesContract"
        countryCode:
          type: string
          description: Two-letter country code of the airport
          nullable: true
        timeZone:
          type: string
          description: Time zone of the airport in Olson format (e.g. "Europe/Amsterdam")
          nullable: true
      additionalProperties: false
      description: Flight's airport reference contract
    ModelFlightTimeEnum:
      enum:
        - Standard
        - ML01
      type: string
      description: "Models of calculating the flight time.<p>Possible values:</p>\r

        <ul>\r

        <li><b>0 - Standard</b>: Standard model of calculation which takes into
        account the great circle distance and the average speed of all aircraft
        typically operating on those distances.</li>\r

        <li><b>1 - ML01</b>: Experimental machine learning (ML) model, which
        attempts to provide more accurate prediction of the flight time by
        taking into account the history of flights on specified route and
        aircraft type within the recent year. This may come in handy in case
        when on certain routes flights take significant detours due to extended
        airspace closures dictated by war conflicts, sanction regulations, etc.
        This can result in significantly increased flight times comparing to
        regular estimations. Or, some routes generally experience longer delays
        than other routes of the same distance. This model attempts to take such
        factors into account and reflect it in the prediction. If a model cannot
        be applied due to lack of historical and/or aircraft data or prediction
        is too off set, it automatically fallbacks to `Standard`.</li>\r

        </ul>\r\n"
    PercentileBracketContract:
      required:
        - delay
        - percentile
      type: object
      properties:
        percentile:
          maximum: 95
          minimum: 5
          type: integer
          description: Percentile of the distribution
          format: int32
        delay:
          type: string
          description: "Delay of the flight for the specific percentile (format:
            [-]hh:mm:ss)."
          format: date-span
      additionalProperties: false
      description: Percentile bracket contract describing the flight delay for a
        specific percentile of the distribution
    Pressure:
