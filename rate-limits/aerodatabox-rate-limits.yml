specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: AeroDataBox
providerId: aerodatabox
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Rate limits depend on the marketplace tier purchased. RapidAPI enforces a per-second
  request cap plus a monthly quota set per tier; AeroDataBox's primary docs site is currently
  blocked to programmatic fetch.
tags:
  - Rate Limiting
  - Aviation
  - Flights
description: AeroDataBox rate limits are governed by the marketplace tier (RapidAPI / api.market).
  Each tier defines a per-second cap and a monthly request quota; soft and hard caps are configured
  on the marketplace.
sources:
  - https://rapidapi.com/aedbx-aedbx/api/aerodatabox
  - https://prod.api.market/api/v1/aedbx/aerodatabox
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: Marketplace tier limit (per-second)
    scope: key
    metric: requests_per_second
    limit: see marketplace tier
    notes: RapidAPI sets a per-second hard cap per tier; check the listing.
  - name: Marketplace tier monthly quota
    scope: key
    metric: requests_per_month
    limit: see marketplace tier
    notes: Tier-defined monthly quota; overages either error or bill at the listed overage rate.
policies:
  - name: Marketplace-enforced
    description: Limits and quotas are enforced by the API marketplace gateway (RapidAPI /
      api.market), not by AeroDataBox directly.
  - name: Backoff
    description: Honor Retry-After when present; use exponential backoff with jitter on 429.
  - name: Tier upgrade
    description: To raise limits, upgrade tier on the marketplace listing.
